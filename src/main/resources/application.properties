# Configuración de la aplicación
spring.application.name=empleados
logging.level.org.springframework=INFO
# Servidor embebido
server.port=8080

# MySQL Database local
spring.datasource.url=jdbc:mysql://localhost:3306/empleadosdb?useSSL=false&serverTimezone=America/Santiago&allowPublicKeyRetrieval=true
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.username=root
spring.datasource.password=admin


# Inicialización automática del esquema
spring.sql.init.mode=always
spring.sql.init.schema-locations=classpath:schema.sql

